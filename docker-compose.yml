services:
  db:
    image: postgres:17.5
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: agendamentos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agendamentos_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # AUTO
  backend-auto:
    profiles: ["auto"]
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /workspace
    volumes:
      - ./backend:/workspace
    ports:
      - "5000:5000"
    networks:
      - agendamentos_network
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=agendamentos;Username=postgres;Password=postgres
    depends_on:
      - db
    restart: unless-stopped
    command: >
      /bin/sh -c "
      dotnet tool restore &&
      dotnet restore &&
      dotnet run --project src/Api/Api.csproj --urls=http://+:5000
      "

  frontend-auto:
    profiles: ["auto"]
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - agendamentos_network
    command: >
      /bin/sh -c "
      npm install &&
      npm run dev -- --host
      "

  # MANUAL
  backend-manual:
    profiles: ["manual"]
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /workspace
    volumes:
      - ./backend:/workspace
    ports:
      - "5000:5000"
    networks:
      - agendamentos_network
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=agendamentos;Username=postgres;Password=postgres
    depends_on:
      - db
    restart: unless-stopped
    command: >
      /bin/sh -c "
      dotnet tool restore &&
      dotnet restore &&
      sleep infinity
      "

  frontend-manual:
    profiles: ["manual"]
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - agendamentos_network
    command: >
      /bin/sh -c "
      npm install &&
      sleep infinity
      "

networks:
  agendamentos_network:
    name: agendamentos_network
    driver: bridge

volumes:
  postgres_data: